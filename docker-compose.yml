services:
  db:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    restart: always
    env_file:
      - .env
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
  api:
    build: .
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      db:
        condition: service_healthy
        restart: true
    env_file:
      - .env
    volumes:
      - .:/fastapi-app
